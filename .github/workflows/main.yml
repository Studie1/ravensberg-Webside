name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'  # daily at 5am UTC (6am CET)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
      - name: Deploy to IONOS via SFTP (lftp mirror)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -c "set sftp:auto-confirm yes; open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' sftp://${{ secrets.FTP_SERVER }}:22; pwd; cls -la; mirror -R --verbose --no-perms ./out/ ./kstvravensberg/; cls -la ./kstvravensberg/"
